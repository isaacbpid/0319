<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尚洗管理 - Gardiner Admin</title>
    
    <!-- PWA & iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="尚洗管理">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <script>
      // Polyfill for 'process' which some libraries expect
      window.process = { env: { NODE_ENV: 'production' } };
      
      console.log("HTML loaded, setting up error handlers...");
      
      // Error logger to help us if the page is still blank
      window.onerror = function(msg, url, line, col, error) {
        console.error("Runtime Error:", msg, "\nAt:", url, ":", line);
        // If the page is blank after 1 second, show the error on screen
        setTimeout(() => {
          const root = document.getElementById('root');
          if (!root || !root.innerHTML) {
            const errorDiv = document.createElement('div');
            errorDiv.id = 'error-display';
            errorDiv.style.cssText = 'padding:40px;color:#ef4444;font-family:system-ui,sans-serif;background:#0f172a;position:fixed;inset:0;z-index:9999;overflow:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;';
            errorDiv.innerHTML = `
              <div style="max-width:600px;width:100%;">
                <h1 style="font-size:2rem;font-weight:900;margin-bottom:1rem;text-transform:uppercase;letter-spacing:-0.02em;">Application Error</h1>
                <p style="font-size:1.125rem;font-weight:500;margin-bottom:2rem;color:#94a3b8;">The application failed to load. This might be due to a configuration error or a network issue.</p>
                <div style="background:#1e293b;padding:2rem;border-radius:1.5rem;text-align:left;border:1px solid rgba(255,255,255,0.1);box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
                  <p style="font-weight:700;margin-bottom:0.5rem;color:#f8fafc;">Error Details:</p>
                  <code style="display:block;background:#0f172a;padding:1rem;border-radius:0.75rem;font-family:monospace;font-size:0.875rem;color:#f43f5e;word-break:break-all;">${msg}</code>
                  <p style="font-size:0.75rem;color:#64748b;margin-top:1rem;">Location: ${url}:${line}:${col}</p>
                  ${error ? `<pre style="margin-top:1rem;font-size:0.75rem;color:#475569;overflow:auto;max-height:200px;background:#0f172a;padding:1rem;border-radius:0.75rem;">${error.stack}</pre>` : ''}
                </div>
                <button onclick="window.location.reload()" style="margin-top:2rem;padding:1rem 2rem;background:#3b82f6;color:white;border:none;border-radius:1rem;font-weight:900;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;box-shadow:0 10px 15px -3px rgba(59,130,246,0.3);">Reload Page</button>
              </div>
            `;
            document.body.appendChild(errorDiv);
          }
        }, 1000);
      };
      
      window.onunhandledrejection = function(event) {
        console.error("Unhandled Rejection:", event.reason);
        window.onerror(event.reason ? event.reason.message : "Promise Rejection", "", 0, 0, event.reason);
      };
    </script>
</head>
<body>
    <div id="root"></div>
<script type="module">
  console.log("Starting index.tsx module load...");
</script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
